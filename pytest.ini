[pytest]
testpaths = tests evals
python_files = test_*.py eval_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = 
    -v
    --strict-markers
    --tb=short
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests (requires populated chroma_db)
    evals: marks pydantic-evals evaluation tests
